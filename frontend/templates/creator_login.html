<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создатель — Вход</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="page page--centered">
<div class="card card--medium">
    <h1 class="title">Создатель</h1>
    <form class="form" id="creator-login-form">
        <label class="form__field">
            <span>Имя (логин)</span>
            <input type="text" name="username" required>
        </label>
        <label class="form__field">
            <span>Пароль</span>
            <input type="password" name="password" required>
        </label>
        <div class="form__actions">
            <button class="btn btn--primary" type="submit">Войти</button>
            <button class="btn btn--ghost" type="button" id="creator-register-btn">Зарегистрироваться</button>
        </div>
    </form>
</div>
<script src="/static/js/creator_auth.js"></script>
</body>
</html>
