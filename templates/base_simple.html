<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Викторина{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="page {% block body_class %}{% endblock %}">
<header class="topbar">
    <div class="topbar__title">Викторина</div>
    <nav class="topbar__nav">
        <a class="btn btn--ghost" href="/">Главная</a>

        <a class="btn btn--ghost" href="/creator/login">Создатель</a>

<main class="page-main">

</main>

<footer class="footer">

</footer>
</body>
</html>
