{% extends "base_simple.html" %}

{% block title %}Игрок — Викторина{% endblock %}

{% block content %}
<div class="card card--medium">
    <h1 class="title">Игрок</h1>
    <form class="form" id="player-form">
        <label class="form__field">
            <span>Ваше имя</span>
            <input type="text" name="player_name" required>
        </label>
        <label class="form__field">
            <span>Выберите викторину</span>
            <select name="creator_id" id="creator-select">
            </select>
        </label>
        <button class="btn btn--primary" type="submit">Начать игру</button>
    </form>

    <section class="section">
        <h2 class="section-title">Таблица рекордов</h2>
        <div id="highscores-container">
            <p class="muted">Выберите викторину, чтобы увидеть рекорды.</p>
        </div>
    </section>
</div>
<script src="/static/js/player.js"></script>
{% endblock %}
